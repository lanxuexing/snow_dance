<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <!-- Start Single Page Apps for GitHub Pages -->
  <script type="text/javascript">
    (function(l) {
      if (l.search) {
        var q = {};
        l.search.slice(1).split('&').forEach(function(v) {
          var a = v.split('=');
          q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
        });
        if (q.p !== undefined) {
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + (q.p ? '/' + q.p : '') +
            (q.q ? '?' + q.q : '') +
            l.hash
          );
        }
      }
    }(window.location));
  </script>
  <!-- End Single Page Apps for GitHub Pages -->

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SnowDance is a premium, high-performance tech blog engine built with Flutter Web, featuring frosted glass aesthetics and modern technical writing features.">
  <meta name="keywords" content="Flutter, Flutter Web, Blog Engine, Tech Blog, SnowDance, Premium UI">
  <meta name="author" content="lanxuexing">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="SnowDance - Premium Tech Blog Engine built with Flutter">
  <meta property="og:description" content="SnowDance is a premium, high-performance tech blog engine built with Flutter Web, featuring frosted glass aesthetics and modern technical writing features.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SnowDance">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SnowDance - Premium Tech Blog Engine built with Flutter</title>
  <link rel="manifest" href="manifest.json">

  <!-- JSON-LD Structured Data Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "SnowDance",
    "url": "https://lanxuexing.github.io/snow_dance/",
    "author": {
      "@type": "Person",
      "name": "lanxuexing"
    },
    "description": "SnowDance is a premium, high-performance tech blog engine built with Flutter Web, featuring frosted glass aesthetics and modern technical writing features.",
    "publisher": {
      "@type": "Organization",
      "name": "SnowDance Dev Team",
      "logo": {
        "@type": "ImageObject",
        "url": "https://lanxuexing.github.io/snow_dance/favicon.png"
      }
    }
  }
  </script>
  <style>
    body {
      background-color: #020420; /* Unified dark background with FrostedBackground & AppTheme */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .loading-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.4s ease-out;
    }
    .logo-pulse {
      width: 64px;
      height: 64px;
      background-color: #00DC82;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s infinite ease-in-out;
      box-shadow: 0 0 20px rgba(0, 220, 130, 0.4);
    }
    .logo-pulse svg {
      width: 32px;
      height: 32px;
      stroke: #ffffff;
      fill: none;
    }
    .loading-text {
      margin-top: 32px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeIn 1s ease-out;
    }
    @keyframes pulse {
      0% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(0, 220, 130, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(0, 220, 130, 0); }
      100% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(0, 220, 130, 0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading-container">
    <div class="logo-pulse">
      <svg viewBox="0 0 24 24">
        <path d="M12 2V22M2 12H22M4.93 4.93L19.07 19.07M4.93 19.07L19.07 4.93M12 6L10 8M12 6L14 8M12 18L10 16M12 18L14 16M6 12L8 10M6 12L8 14M18 12L16 10M18 12L16 14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="loading-text">SNOWDANCE</div>
  </div>
  <script>
    // Smoothly fade out HTML loading element when Flutter canvas mounts
    window.addEventListener('load', function() {
      var checkFlutter = setInterval(function() {
        var flutterView = document.querySelector('flutter-view');
        if (flutterView) {
          clearInterval(checkFlutter);
          var loading = document.getElementById('loading');
          if (loading) {
            loading.style.opacity = '0';
            setTimeout(function() {
              if (loading && loading.parentNode) {
                loading.parentNode.removeChild(loading);
              }
            }, 400);
          }
        }
      }, 50);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
