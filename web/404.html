<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SnowDance - Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment.

      // pathSegmentsToKeep = 1 for GitHub project pages (e.g. /snow_dance/)
      // pathSegmentsToKeep = 0 for custom domains or user pages (e.g. username.github.io/)
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
